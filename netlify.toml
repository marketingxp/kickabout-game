# Netlify configuration for Kickabout
# Mirrors the hosting setup in firebase.json so the site behaves the same
# on either platform.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 6 requires Node 18+; pin a current LTS for reproducible builds.
  NODE_VERSION = "22"

# SPA fallback: serve index.html for any unknown path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build output — cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers for all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Always revalidate the HTML entry point so deploys show up immediately.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
